<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>បន្ថែមផលិតផល</title>

    
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    
    <link
        href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{
            background: wheat;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .main-card{
            border: none;
            border-radius: 25px;
            overflow: hidden;
        }

        .card-header-custom{
            background: linear-gradient(135deg, gold, grey);
            color: white;
            padding: 40px 20px;
        }

        .form-control{
            border-radius: 12px;
            padding: 12px;
        }

        .btn-khmer{
            background: linear-gradient(135deg, gold, grey);
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }

        .icon-box{
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .btn btn-primary btn-khmer{
            background: linear-gradient(135deg, gold, grey); 
        }


    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg main-card">

                
                <div class="card-header-custom text-center">

                    <div class="icon-box mb-3">
                        <i class="bi bi-box-seam display-4"></i>
                    </div>

                    <h2 class="fw-bold">
                        បន្ថែមផលិតផលថ្មី
                    </h2>

                    <p class="mb-0">
                        សូមបំពេញព័ត៌មានផលិតផលខាងក្រោម
                    </p>

                </div>

                
                <div class="card-body p-5">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                ឈ្មោះផលិតផល
                            </label>
                            {{ form.name }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                ចំនួន
                            </label>
                            {{ form.quantity }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                តម្លៃ
                            </label>
                            {{ form.price }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                ប្រភេទ​ ទំនិញ
                            </label>
                            {{ form.category }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                ក្រុមហ៊ុន​​​​ កម្មសិទ្ធ
                            </label>
                            {{ form.supplier }}
                        </div>

                        
                        <div class="d-grid gap-3">

                            <button
                                type="submit"
                                class="btn btn-primary btn-khmer"
                            >
                                <i class="bi bi-check-circle"></i>
                                រក្សាទុកផលិតផល
                            </button>

                            <a
                                href="/"
                                class="btn btn-outline-secondary btn-khmer"
                            >
                                <i class="bi bi-arrow-left"></i>
                                ត្រឡប់ក្រោយ
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
