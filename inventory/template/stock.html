<!DOCTYPE html>
<html>

<head>

    <title>Stock Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            min-height: 100vh;
        }

        .main-box{
            max-width: 700px;
            margin: auto;
            padding-top: 50px;
        }

        .topbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .topbar h2{
            font-weight: 600;
            color: #111827;
        }

        .card{
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card-body{
            padding: 35px;
        }

        input,
        select{
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            margin-top: 5px;
            margin-bottom: 18px;
        }

        label{
            font-weight: 500;
            margin-bottom: 5px;
            color: #374151;
        }

        .btn{
            border-radius: 10px !important;
            padding: 10px 18px;
            font-weight: 500;
        }

        .alert{
            border-radius: 12px;
        }

    </style>

</head>

<body>

<div class="container main-box">

    <div class="topbar">

        <h2> Stock Management</h2>

        <a href="/dashboard/" class="btn btn-dark">
            Dashboard
        </a>

    </div>

    <div class="card">

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary w-100">
                    Update Stock
                </button>

            </form>

            {% if message %}

                <div class="alert alert-info mt-4">

                    {{ message }}

                </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
