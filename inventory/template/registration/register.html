<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            width:430px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .register-box h2{
            text-align:center;
            margin-bottom:30px;
            font-weight:600;
            color:#111827;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:10px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,0.2);
        }

        label{
            font-weight:500;
            color:#374151;
        }

        .helptext{
            font-size:13px;
            color:#6b7280;
        }

        ul{
            font-size:13px;
            color:#6b7280;
            padding-left:18px;
        }

        .btn-dark{
            border-radius:10px;
            padding:12px;
            font-weight:500;
            transition:0.3s;
        }

        .btn-dark:hover{
            transform:translateY(-2px);
        }

        a{
            text-decoration:none;
            color:#2563eb;
            font-weight:500;
        }

        a:hover{
            text-decoration:underline;
        }

        .alert{
            border-radius:12px;
            font-size:14px;
        }

    </style>

</head>

<body>

    <div class="register-box">

        {% if form.errors %}

        <div class="alert alert-danger mb-4">

            {{ form.errors }}

        </div>

        {% endif %}

        <h2> Create Account</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-dark w-100">
                Register
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="/accounts/login/">
                Already have account?
            </a>

        </div>

    </div>

</body>

</html>
