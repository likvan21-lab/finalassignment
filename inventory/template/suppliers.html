<!DOCTYPE html>
<html>

<head>

    <title>Suppliers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .main-box{
            max-width: 1100px;
            margin: auto;
            padding-top: 40px;
        }

        .topbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .topbar h2{
            font-weight: 600;
            color: #111827;
        }

        .card{
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h4{
            font-weight: 600;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            margin-bottom: 15px;
        }

        .btn{
            border-radius: 10px !important;
            padding: 10px 18px;
            font-weight: 500;
        }

        table{
            margin-top: 15px;
        }

        th{
            background: #111827 !important;
            color: white !important;
        }

        tr:hover{
            background: #f3f4f6;
            transition: 0.2s;
        }

    </style>

</head>

<body>

<div class="container main-box">

    <div class="topbar">

        <h2> Supplier Management</h2>

        <a href="/dashboard/" class="btn btn-dark">
            Dashboard
        </a>

    </div>

    <!-- Add Supplier -->
    <div class="card p-4 mb-4">

        <h4>Add Supplier</h4>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-primary">
                Add Supplier
            </button>

        </form>

    </div>

    <!-- Supplier List -->
    <div class="card p-4">

        <h4>Supplier List</h4>

        <table class="table table-hover align-middle">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                </tr>

            </thead>

            <tbody>

                {% for supplier in suppliers %}

                <tr>

                    <td>{{ supplier.id }}</td>

                    <td>{{ supplier.name }}</td>

                    <td>{{ supplier.phone }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
